# ════════════════════════════════════════════════════════
# AbuseRadar — host nginx (terminates SSL, reverse-proxies to Docker)
# Place at /etc/nginx/sites-available/abuseradar.conf and symlink into sites-enabled.
# Get certs first:  certbot certonly --nginx -d abuseradar.org -d www.abuseradar.org
# ════════════════════════════════════════════════════════

# ─── Redirect all HTTP → HTTPS ───
server {
    listen 80;
    listen [::]:80;
    server_name abuseradar.org www.abuseradar.org;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://$host$request_uri; }
}

# ─── HTTPS: marketing site + console + API proxy ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name abuseradar.org www.abuseradar.org;

    ssl_certificate     /etc/letsencrypt/live/abuseradar.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abuseradar.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Static site root (clone web/ folder here, or proxy to the web container)
    root /var/www/abuseradar/web;
    index index.html;

    # ─── Static assets ───
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    location ~* \.(png|jpg|jpeg|webp|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Console: served from same static tree
    location /console/ {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # ─── /api/ → FastAPI backend (Docker, bound to 127.0.0.1:7777) ───
    location /api/ {
        proxy_pass http://127.0.0.1:7777/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── /admin/ → Streamlit dashboard (optional — restrict by IP/auth!) ───
    # Streamlit needs websocket upgrade. Protect with basic auth in prod.
    location /admin/ {
        # Uncomment to enable basic auth (htpasswd -c /etc/nginx/.htpasswd analyst)
        # auth_basic "AbuseRadar Admin";
        # auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:7778/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ─── Default: serve static, fall back to .html ───
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Hide dotfiles
    location ~ /\. { deny all; }
}
