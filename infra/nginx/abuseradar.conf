# ════════════════════════════════════════════════════════
# AbuseRadar — host nginx (Cloudflare Origin cert + basic auth)
#
# Place at:        /etc/nginx/sites-available/abuseradar.conf
# Symlink:         ln -sf /etc/nginx/sites-available/abuseradar.conf \
#                          /etc/nginx/sites-enabled/abuseradar.conf
# Cert location:   /etc/ssl/cloudflare/abuseradar.org.{pem,key}
# htpasswd:        /etc/nginx/.abuseradar.htpasswd
#                  htpasswd -cb /etc/nginx/.abuseradar.htpasswd Enki '<password>'
# ════════════════════════════════════════════════════════

# ─── HTTP → HTTPS ───
server {
    listen 80;
    listen [::]:80;
    server_name abuseradar.org www.abuseradar.org;

    # Let's Encrypt challenge (Cloudflare Origin cert kullanırken bu satır
    # zararsız, gelecekte Let's Encrypt'e dönmek istersen hazır kalsın)
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://$host$request_uri; }
}

# ─── HTTPS ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name abuseradar.org www.abuseradar.org;

    # Cloudflare Origin Certificate (15 yıl, auto-renew yok — sertifika kendisi 2041'e kadar geçerli)
    ssl_certificate     /etc/ssl/cloudflare/abuseradar.org.pem;
    ssl_certificate_key /etc/ssl/cloudflare/abuseradar.org.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Static site root
    root /opt/abuseradar/web;
    index index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ─── Long-cache assets ───
    location ~* \.(png|jpg|jpeg|webp|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Console (admin panel) — basic auth ───
    location /console/ {
        auth_basic "AbuseRadar Console";
        auth_basic_user_file /etc/nginx/.abuseradar.htpasswd;
        try_files $uri $uri.html $uri/index.html =404;
    }

    # ─── /api/ → FastAPI backend (Docker, 127.0.0.1:7777) — basic auth ───
    # ^~ → prefix match daha YÜKSEK öncelik. Olmazsa "*.png" regex location
    # bu path'i yakalıyor ve statik file sanıyor (404).
    location ^~ /api/ {
        auth_basic "AbuseRadar API";
        auth_basic_user_file /etc/nginx/.abuseradar.htpasswd;

        proxy_pass http://127.0.0.1:7777/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User $remote_user;
        proxy_read_timeout 120s;
        client_max_body_size 100M;   # CSV upload
    }

    # ─── Public marketing site (root) ───
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Hide dotfiles
    location ~ /\. { deny all; }
}
