# nginx config for the bundled "web" container in docker-compose.prod.yml.
# Serves /web as static, with sane caching and SPA-style fallback for sub-pages.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip everything sensible
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Long-cache static assets (immutable PNG/CSS/JS)
    location ~* \.(png|jpg|jpeg|webp|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ~* \.(css|js|json)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Pretty URLs: try .html, then directory, then 404
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Console SPA-ish: same try_files
    location /console/ {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Hide hidden files
    location ~ /\. { deny all; }
}
