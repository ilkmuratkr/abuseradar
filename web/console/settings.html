<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — AbuseRadar Console</title>
  <meta name="theme-color" content="#001016">
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="console.css">
</head>
<body>

<div class="app">
  <aside class="rail" data-active="settings"></aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" data-toggle-rail style="display:none"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <nav class="crumbs"><a href="index.html">Console</a><span class="sep">/</span><span class="current">Settings</span></nav>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost" id="btn-refresh">Refresh</button>
      </div>
    </header>

    <div class="content">
      <div class="page-head">
        <div>
          <h1>System health &amp; settings</h1>
          <p>Live status of database, redis, VPN egress, integrations and API keys.</p>
        </div>
      </div>

      <div class="grid-2 row-gap">
        <section class="panel">
          <div class="panel-head"><h3>System health</h3><span class="dot-status live" id="health-dot"></span></div>
          <div class="panel-body">
            <table class="tbl">
              <tbody id="health-rows">
                <tr><td><span class="dot-status"></span> Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h3>VPN egress</h3></div>
          <div class="panel-body" style="display:flex;flex-direction:column;gap:.7rem" id="vpn-host">
            <div class="loading-spinner">Probing VPN containers…</div>
          </div>
        </section>
      </div>

      <div class="grid-2 row-gap">
        <section class="panel">
          <div class="panel-head"><h3>Integrations</h3></div>
          <div class="panel-body" style="display:flex;flex-direction:column;gap:.55rem" id="integ-host">
            <div class="loading-spinner">Loading…</div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h3>Maintenance</h3></div>
          <div class="panel-body" style="display:flex;flex-direction:column;gap:.5rem">
            <button class="btn btn-primary" id="btn-monitor" style="justify-content:flex-start">
              <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><polyline points="21 3 21 8 16 8"/></svg>
              Run weekly monitoring cycle
            </button>
            <a href="csv.html" class="btn btn-ghost" style="justify-content:flex-start">
              <svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
              Process CSV inbox
            </a>
            <a href="pipeline.html" class="btn btn-ghost" style="justify-content:flex-start">
              <svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
              Run pipeline
            </a>
          </div>
        </section>
      </div>

    </div>
  </main>
</div>

<script src="api.js"></script>
<script src="console.js"></script>
<script>
function statusBadge(s) {
  if (typeof s === "string" && s.startsWith("error")) return AR.badge(s.slice(0, 30), "red");
  if (s === "healthy" || s === "ok") return AR.badge("Healthy", "green");
  if (s === "set") return AR.badge("Configured", "green");
  if (s === "missing") return AR.badge("Missing", "orange");
  return AR.badge(String(s), "muted");
}

async function loadHealth() {
  try {
    const h = await AR.get("/health/detailed");
    const rows = [
      ["Database (PostgreSQL)", h.db],
      ["Cache (Redis)", h.redis],
      ["Gemini API key", h.gemini_key],
      ["Resend API key", h.resend_key],
    ];
    document.getElementById("health-rows").innerHTML = rows.map(([k, v]) => `
      <tr>
        <td><span class="dot-status ${v === 'healthy' || v === 'set' ? 'live' : 'warn'}"></span> &nbsp;<span class="strong">${AR.escapeHtml(k)}</span></td>
        <td class="right">${statusBadge(v)}</td>
      </tr>
    `).join("");
  } catch (e) {
    document.getElementById("health-rows").innerHTML = `<tr><td colspan="2"><div class="error-banner">${AR.escapeHtml(e.message)}</div></td></tr>`;
  }
}

async function loadVpn() {
  const host = document.getElementById("vpn-host");
  host.innerHTML = "";
  for (const name of ["tr", "us"]) {
    try {
      const v = await AR.get(`/vpn/${name}/status`);
      const ok = v.status === "ok";
      host.innerHTML += `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.7rem .9rem;border:1px solid var(--border);border-radius:7px">
          <div>
            <div class="strong" style="font-size:.88rem">VPN-${name.toUpperCase()} ${ok ? "🟢" : "⚠"}</div>
            <div style="font-size:.72rem;color:var(--text-4);margin-top:.15rem">
              ${ok ? `${AR.escapeHtml(v.ip || "")} · ${AR.escapeHtml(v.city || "")} ${AR.escapeHtml(v.country || "")}` : AR.escapeHtml(v.status || "down")}
            </div>
          </div>
          ${ok ? AR.badge("Healthy", "green") : AR.badge("Down", "red")}
        </div>
      `;
    } catch (e) {
      host.innerHTML += `<div class="error-banner">VPN-${name.toUpperCase()}: ${AR.escapeHtml(e.message)}</div>`;
    }
  }
}

async function loadIntegrations() {
  try {
    const h = await AR.get("/health/detailed");
    const items = [
      { name: "Gemini · classifier & vision", status: h.gemini_key === "set" ? "connected" : "missing" },
      { name: "Resend · outbound email", status: h.resend_key === "set" ? "connected" : "missing" },
      { name: "Cloudflare abuse · OpenClaw", status: "automated" },
      { name: "Google Safe Browsing", status: "public" },
    ];
    document.getElementById("integ-host").innerHTML = items.map(i => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:.7rem .9rem;border:1px solid var(--border);border-radius:7px">
        <div class="strong" style="font-size:.85rem">${AR.escapeHtml(i.name)}</div>
        ${i.status === "connected" ? AR.badge("Connected", "green") :
          i.status === "missing" ? AR.badge("API key missing", "orange") :
          AR.badge(i.status, "muted")}
      </div>
    `).join("");
  } catch (e) {
    document.getElementById("integ-host").innerHTML = `<div class="error-banner">${AR.escapeHtml(e.message)}</div>`;
  }
}

document.getElementById("btn-monitor").addEventListener("click", async () => {
  AR.toast("Weekly monitoring running…");
  try {
    const r = await AR.post("/monitor/weekly");
    AR.toast(`Done: ${JSON.stringify(r).slice(0, 80)}`, "success");
  } catch (e) { AR.toast(e.message, "error"); }
});

document.getElementById("btn-refresh").addEventListener("click", () => {
  loadHealth(); loadVpn(); loadIntegrations();
});

loadHealth();
loadVpn();
loadIntegrations();
</script>
</body>
</html>
