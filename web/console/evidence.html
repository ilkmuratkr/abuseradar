<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evidence — AbuseRadar Console</title>
  <meta name="theme-color" content="#001016">
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="console.css">
</head>
<body>

<div class="app">
  <aside class="rail" data-active="evidence"></aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" data-toggle-rail style="display:none"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <nav class="crumbs"><a href="index.html">Console</a><span class="sep">/</span><span class="current">Evidence</span></nav>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost" id="btn-refresh">Refresh</button>
      </div>
    </header>

    <div class="content">
      <div class="page-head">
        <div>
          <h1>Evidence vault</h1>
          <p>DOM snapshots, screenshots and hacklink analysis captured by the crawler. Filesystem-backed at <span class="mono">/data/evidence/</span>.</p>
        </div>
        <div class="page-head-actions">
          <span class="meta" id="bundle-summary">—</span>
        </div>
      </div>

      <section class="panel">
        <div class="panel-head"><h3>Captured bundles</h3></div>
        <div id="ev-host"><div class="loading-spinner">Loading…</div></div>
      </section>
    </div>
  </main>
</div>

<script src="api.js"></script>
<script src="console.js"></script>
<script>
async function load() {
  AR.showLoading("ev-host");
  try {
    const r = await AR.get("/evidence");
    const totalHl = r.bundles.reduce((s, b) => s + (b.hacklink_count || 0), 0);
    AR.setText("bundle-summary", `${r.count} bundles · ${totalHl} hacklinks total`);

    if (!r.bundles.length) {
      AR.showEmpty("ev-host", "No evidence bundles yet. Run the crawler first.");
      return;
    }

    const rows = r.bundles.map(b => `
      <tr>
        <td class="mono" style="font-size:.78rem">${AR.escapeHtml(b.bundle_id)}</td>
        <td><span class="strong">${AR.escapeHtml(b.domain)}</span></td>
        <td class="right">${b.screenshots}</td>
        <td class="right">${b.dom_files}</td>
        <td class="right strong" style="color:var(--orange)">${b.hacklink_count}</td>
        <td>${b.has_analysis ? AR.badge("Analysed", "green") : AR.badge("DOM only", "muted")}</td>
        <td><span style="font-size:.74rem;color:var(--text-3)">${AR.fmt.relative(b.captured_at)}</span></td>
        <td class="right" style="white-space:nowrap">
          <a href="evidence-detail.html?domain=${encodeURIComponent(b.domain)}" class="btn-link" style="margin-right:.5rem">Open</a>
          <button class="btn-link ev-del-btn" data-domain="${AR.escapeHtml(b.domain)}" style="color:var(--red)">Delete</button>
        </td>
      </tr>
    `).join("");

    document.getElementById("ev-host").innerHTML = `
      <table class="tbl">
        <thead><tr><th>Bundle</th><th>Domain</th><th class="right">Shots</th><th class="right">DOM</th><th class="right">Hacklinks</th><th>State</th><th>Captured</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    document.querySelectorAll(".ev-del-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const d = btn.dataset.domain;
        if (!confirm(`Delete bundle for ${d}?\n\nFilesystem files will be removed (screenshots, DOM dumps, analysis).\nDB hacklink rows will be cleaned.\nSite verification status will reset.\n\nThis cannot be undone.`)) return;
        btn.disabled = true; btn.textContent = "Deleting…";
        try {
          await AR.del(`/evidence/${encodeURIComponent(d)}`);
          AR.toast(`${d} bundle deleted`, "success");
          load();
        } catch (e) {
          AR.toast(e.message, "error");
          btn.disabled = false; btn.textContent = "Delete";
        }
      });
    });
  } catch (e) {
    AR.showError("ev-host", e.message);
  }
}

document.getElementById("btn-refresh").addEventListener("click", load);
load();
</script>
</body>
</html>
