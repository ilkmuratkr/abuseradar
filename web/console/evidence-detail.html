<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evidence detail — AbuseRadar Console</title>
  <meta name="theme-color" content="#001016">
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="console.css">
</head>
<body>

<div class="app">
  <aside class="rail" data-active="evidence"></aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" data-toggle-rail style="display:none"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <nav class="crumbs">
          <a href="index.html">Console</a>
          <span class="sep">/</span>
          <a href="evidence.html">Evidence</a>
          <span class="sep">/</span>
          <span class="current mono" id="crumb-domain">—</span>
        </nav>
      </div>
      <div class="topbar-right">
        <a href="report.html" class="btn btn-primary" id="report-link">Generate briefing</a>
      </div>
    </header>

    <div class="content">

      <div class="page-head">
        <div>
          <div style="display:flex;align-items:center;gap:.55rem;margin-bottom:.4rem">
            <span class="mono" id="bundle-id" style="font-size:.78rem;color:var(--text-3)">—</span>
            <span class="badge" id="bundle-state">—</span>
          </div>
          <h1 id="ev-domain">—</h1>
          <p id="ev-summary">—</p>
        </div>
      </div>

      <div class="kpis">
        <div class="kpi"><div class="kpi-label">Screenshots</div><div class="kpi-value" id="kpi-shots">—</div><div class="kpi-trend">PNG captures</div></div>
        <div class="kpi orange"><div class="kpi-label">Hidden links</div><div class="kpi-value" id="kpi-hacklinks">—</div><div class="kpi-trend">rendered + JS-diff</div></div>
        <div class="kpi gold"><div class="kpi-label">DOM dumps</div><div class="kpi-value" id="kpi-doms">—</div><div class="kpi-trend">HTML snapshots</div></div>
        <div class="kpi"><div class="kpi-label">Bundle size</div><div class="kpi-value" id="kpi-size">—</div><div class="kpi-trend">on disk</div></div>
      </div>

      <div class="grid-2-1 row-gap">
        <section class="panel">
          <div class="panel-head"><h3>Screenshots</h3><span class="meta" id="ss-count">—</span></div>
          <div class="panel-body" id="ss-host"><div class="loading-spinner">Loading…</div></div>
        </section>

        <section class="panel">
          <div class="panel-head"><h3>Bundle metadata</h3></div>
          <div class="panel-body">
            <dl class="kv" id="meta-list"><dt>—</dt><dd>Loading…</dd></dl>
          </div>
        </section>
      </div>

      <section class="panel row-gap">
        <div class="panel-head">
          <h3>Detected hacklinks</h3>
          <span class="meta" id="hl-count">—</span>
        </div>
        <div id="hl-host"><div class="loading-spinner">Loading…</div></div>
      </section>

      <section class="panel row-gap">
        <div class="panel-head">
          <h3>DOM dumps</h3>
          <select id="dom-select" style="padding:.4rem .7rem;background:var(--bg-card-2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.82rem"></select>
        </div>
        <div class="panel-body">
          <pre id="dom-body" class="code" style="margin:0;padding:.85rem;font-size:.72rem;background:var(--bg-card-2);border-radius:6px;max-height:500px;overflow:auto;line-height:1.4">Pick a DOM file above</pre>
        </div>
      </section>

    </div>
  </main>
</div>

<script src="api.js"></script>
<script src="console.js"></script>
<script>
const params = new URLSearchParams(location.search);
const domain = params.get("domain");

if (!domain) {
  document.querySelector(".content").innerHTML = '<div class="error-banner">Missing ?domain= parameter. <a href="evidence.html">Back to vault</a></div>';
} else {
  document.getElementById("crumb-domain").textContent = domain;
  document.getElementById("report-link").href = `report.html?domain=${encodeURIComponent(domain)}`;
  loadAll();
}

async function loadAll() {
  // Bundle meta
  try {
    const b = await AR.get(`/evidence/${encodeURIComponent(domain)}`);
    document.getElementById("ev-domain").textContent = domain;
    document.getElementById("bundle-id").textContent = b.bundle_id;
    document.getElementById("bundle-state").innerHTML = b.has_analysis
      ? '<span class="badge red">Confirmed breach</span>'
      : '<span class="badge muted">DOM only</span>';
    document.getElementById("ev-summary").textContent =
      `${b.hacklink_count} hidden links across ${b.screenshots} screenshots and ${b.dom_files} DOM dumps. Captured ${AR.fmt.relative(b.captured_at)}.`;

    document.getElementById("kpi-shots").textContent = b.screenshots;
    document.getElementById("kpi-hacklinks").textContent = b.hacklink_count;
    document.getElementById("kpi-doms").textContent = b.dom_files;
    document.getElementById("kpi-size").textContent = AR.fmt.bytes(b.size_bytes);

    // Meta list
    document.getElementById("meta-list").innerHTML = `
      <dt>Bundle</dt><dd><span class="mono">${AR.escapeHtml(b.bundle_id)}</span></dd>
      <dt>Domain</dt><dd>${AR.escapeHtml(b.domain)}</dd>
      <dt>Captured</dt><dd>${AR.fmt.date(b.captured_at)}</dd>
      <dt>Screenshots</dt><dd>${b.screenshots}</dd>
      <dt>DOM dumps</dt><dd>${b.dom_files}</dd>
      <dt>Hacklinks</dt><dd>${b.hacklink_count}</dd>
      <dt>Size on disk</dt><dd>${AR.fmt.bytes(b.size_bytes)}</dd>
      <dt>C2 URLs</dt><dd>${(b.c2_urls || []).length ? (b.c2_urls.map(u => `<span class="mono" style="font-size:.72rem;color:var(--red)">${AR.escapeHtml(u)}</span>`).join("<br>")) : "—"}</dd>
    `;

    // Screenshots
    const ssHost = document.getElementById("ss-host");
    AR.setText("ss-count", `${b.screenshots} files`);
    if (!b.screenshots) {
      AR.showEmpty("ss-host", "No screenshots in this bundle.");
    } else {
      ssHost.innerHTML = (b.screenshot_names || []).map((n, i) => `
        <figure style="margin:0 0 1.2rem">
          <img src="/api/evidence/${encodeURIComponent(domain)}/screenshot/${i}" alt="${AR.escapeHtml(n)}" style="width:100%;border-radius:8px;border:1px solid var(--border)">
          <figcaption style="font-size:.72rem;color:var(--text-4);margin-top:.3rem;text-align:center">${AR.escapeHtml(n)}</figcaption>
        </figure>
      `).join("");
    }

    // DOM dropdown
    const sel = document.getElementById("dom-select");
    sel.innerHTML = (b.dom_names || []).map(n => `<option value="${AR.escapeHtml(n)}">${AR.escapeHtml(n)}</option>`).join("") || '<option>—</option>';
    sel.addEventListener("change", () => loadDom(sel.value));
    if ((b.dom_names || []).length) loadDom(b.dom_names[0]);
  } catch (e) {
    AR.toast("Bundle: " + e.message, "error");
    document.getElementById("ev-summary").textContent = "Error: " + e.message;
  }

  // Hacklinks
  try {
    const data = await AR.get(`/evidence/${encodeURIComponent(domain)}/hacklinks`);
    const rendered = data.rendered_hacklinks || [];
    const jsdiff = data.js_diff_hacklinks || [];
    const scripts = data.injection_scripts || [];

    AR.setText("hl-count", `${rendered.length} rendered · ${jsdiff.length} JS-diff · ${scripts.length} scripts`);

    let html = "";
    if (rendered.length) {
      html += `<div style="padding:.8rem 1.1rem;border-bottom:1px solid var(--border);font-weight:600;color:var(--text)">Rendered DOM hacklinks (${rendered.length})</div>`;
      html += `<table class="tbl"><thead><tr><th class="right">Score</th><th>Anchor</th><th>URL</th><th>Hiding</th></tr></thead><tbody>`;
      html += rendered.slice(0, 50).map(h => `
        <tr>
          <td class="right strong" style="color:var(--orange)">${h.score || 0}</td>
          <td><span class="mono" style="font-size:.74rem">${AR.escapeHtml(AR.fmt.truncate(h.text || "—", 50))}</span></td>
          <td><span class="mono" style="font-size:.72rem;color:var(--text-3)">${AR.escapeHtml(AR.fmt.truncate(h.href || "", 60))}</span></td>
          <td><span style="font-size:.72rem;color:var(--text-4)">${AR.escapeHtml(h.hiding_method || "—")}</span></td>
        </tr>
      `).join("");
      html += `</tbody></table>`;
    }
    if (jsdiff.length) {
      html += `<div style="padding:.8rem 1.1rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-weight:600;color:var(--text)">JS-injected hacklinks (${jsdiff.length})</div>`;
      html += `<table class="tbl"><thead><tr><th>URL</th><th>Method</th></tr></thead><tbody>`;
      html += jsdiff.slice(0, 30).map(h => `
        <tr><td><span class="mono" style="font-size:.72rem">${AR.escapeHtml(h.href || "")}</span></td><td><span class="mono" style="font-size:.72rem;color:var(--text-3)">${AR.escapeHtml(h.method || "—")}</span></td></tr>
      `).join("");
      html += `</tbody></table>`;
    }
    if (scripts.length) {
      html += `<div style="padding:.8rem 1.1rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-weight:600;color:var(--text)">Injection scripts (${scripts.length})</div>`;
      html += scripts.map(s => `
        <div style="padding:.7rem 1.1rem;border-bottom:1px solid var(--border);font-size:.78rem">
          ${(s.decoded_c2_urls && s.decoded_c2_urls.length) ? `<div style="color:var(--red);font-weight:600">⚠ Decoded C2 URLs:</div><div class="mono" style="font-size:.72rem;margin-top:.3rem">${s.decoded_c2_urls.map(u => AR.escapeHtml(u)).join("<br>")}</div>` : ""}
          ${s.src ? `<div style="margin-top:.4rem;color:var(--text-3)">Source: <span class="mono">${AR.escapeHtml(s.src)}</span></div>` : ""}
        </div>
      `).join("");
    }

    if (!html) {
      AR.showEmpty("hl-host", "No hacklinks detected.");
    } else {
      document.getElementById("hl-host").innerHTML = html;
    }
  } catch (e) {
    if (e.message.includes("404")) {
      AR.showEmpty("hl-host", "No hacklinks analysis available for this bundle.");
    } else {
      AR.showError("hl-host", e.message);
    }
  }
}

async function loadDom(name) {
  const body = document.getElementById("dom-body");
  body.textContent = "Loading…";
  try {
    const txt = await AR.get(`/evidence/${encodeURIComponent(domain)}/dom/${encodeURIComponent(name)}`);
    body.textContent = txt;
  } catch (e) {
    body.textContent = "Error: " + e.message;
  }
}
</script>
</body>
</html>
