<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting…</title>
  <script>
    // Tek-doğru-rapor evidence-detail.html'e taşındı.
    // Eski bookmark'ları kırmamak için redirect.
    const params = new URLSearchParams(location.search);
    const target = "evidence-detail.html" + (params.toString() ? "?" + params.toString() : "");
    location.replace(target);
  </script>
  <meta http-equiv="refresh" content="0; url=evidence-detail.html">
</head>
<body>
  <p>Redirecting to <a href="evidence-detail.html">evidence-detail.html</a>…</p>
</body>
</html>
