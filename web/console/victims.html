<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compromised institutions — AbuseRadar Console</title>
  <meta name="theme-color" content="#001016">
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="console.css">
</head>
<body>

<div class="app">
  <aside class="rail" data-active="victims"></aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" data-toggle-rail style="display:none"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <nav class="crumbs"><a href="index.html">Console</a><span class="sep">/</span><span class="current">Compromised</span></nav>
      </div>
      <div class="topbar-right">
        <div class="search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
          <input type="text" placeholder="Filter domain, anchor…" id="text-filter">
          <kbd>⌘K</kbd>
        </div>
      </div>
    </header>

    <div class="content">
      <div class="page-head">
        <div>
          <h1>Compromised institutions</h1>
          <p id="vic-summary">—</p>
        </div>
        <div class="page-head-actions">
          <button class="btn btn-ghost" id="btn-export">Export CSV</button>
        </div>
      </div>

      <!-- Filter tabs -->
      <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.1rem;border-bottom:1px solid var(--border);padding-bottom:.5rem">
        <button class="btn btn-ghost vic-tab active" data-verified="all">All</button>
        <button class="btn btn-ghost vic-tab" data-verified="verified">Verified breach</button>
        <button class="btn btn-ghost vic-tab" data-verified="pending">Pending verification</button>
      </div>

      <!-- Type filter dropdown -->
      <div style="margin-bottom:1rem;display:flex;gap:.6rem;align-items:center">
        <label style="font-size:.78rem;color:var(--text-3)">Site type:</label>
        <select id="f-type" style="padding:.45rem .7rem;background:var(--bg-card-2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem">
          <option value="all">All types</option>
          <option value="hukumet_sitesi">Government (.gov)</option>
          <option value="egitim_sitesi">Education (.edu)</option>
          <option value="hacklenmis_site">Hacked site</option>
        </select>
      </div>

      <section class="panel">
        <div id="vic-table-host"><div class="loading-spinner">Loading…</div></div>
      </section>

      <section class="panel row-gap">
        <div class="panel-head"><h3>Quick actions</h3></div>
        <div class="panel-body">
          <div class="form-row">
            <label>Find contacts for domain
              <input type="text" id="contact-domain" placeholder="example.gov">
            </label>
            <label>&nbsp;
              <button class="btn btn-primary" id="btn-find-contacts">Find contacts</button>
            </label>
          </div>
          <div id="contacts-result"></div>
        </div>
      </section>

    </div>
  </main>
</div>

<script src="api.js"></script>
<script src="console.js"></script>
<script>
const state = { verified: "all", type: "all" };
let lastVictims = [];

async function loadVictims() {
  AR.showLoading("vic-table-host");
  try {
    const params = new URLSearchParams({
      site_type: state.type,
      verified: state.verified,
      limit: 200,
    });
    const r = await AR.get(`/victims?${params}`);
    lastVictims = r.victims;
    AR.setText("vic-summary", `${AR.fmt.num(r.count)} victims · ${state.verified === "verified" ? "verified breaches" : state.verified === "pending" ? "awaiting crawl" : "all states"}`);
    renderTable();
  } catch (e) {
    AR.showError("vic-table-host", e.message);
  }
}

function renderTable() {
  const host = document.getElementById("vic-table-host");
  const txt = (document.getElementById("text-filter").value || "").toLowerCase();
  const items = txt
    ? lastVictims.filter(v => (v.url || "").toLowerCase().includes(txt) || (v.anchor || "").toLowerCase().includes(txt))
    : lastVictims;

  if (!items.length) {
    AR.showEmpty("vic-table-host", "No victims match the filter.");
    return;
  }

  const rows = items.map(v => {
    const domain = AR.fmt.domain(v.url);
    // verified state — crawl_status ile birlikte
    let verified;
    if (!v.last_crawl) {
      verified = AR.badge("Pending verification", "muted");
    } else if (v.crawl_status === "compromised") {
      verified = AR.badge("Verified breach", "red");
    } else if (v.crawl_status === "cloaking_detected") {
      verified = AR.badge("Cloaking detected", "red");
    } else if (v.crawl_status === "unreachable") {
      verified = AR.badge("Crawl failed", "orange");
    } else if (v.verified === true) {
      verified = AR.badge("Verified breach", "red");
    } else {
      verified = AR.badge("Crawled · clean", "green");
    }
    return `
      <tr>
        <td>
          <div class="strong">${AR.escapeHtml(domain)}</div>
          <div style="font-size:.7rem;color:var(--text-4)">${AR.escapeHtml(AR.fmt.truncate(v.title || "—", 70))}</div>
        </td>
        <td><span class="mono" style="font-size:.74rem">${AR.escapeHtml(v.type || "—")}</span></td>
        <td><span class="mono" style="font-size:.74rem;color:var(--text-3)">${AR.escapeHtml(AR.fmt.truncate(v.anchor || "—", 30))}</span></td>
        <td class="right">${v.dr ?? "—"}</td>
        <td class="right">${AR.fmt.num(v.traffic || 0)}</td>
        <td class="right strong" style="color:var(--orange)">${v.spam_score}</td>
        <td>${verified}</td>
        <td><span style="font-size:.74rem;color:var(--text-4)">${AR.fmt.relative(v.last_seen)}</span></td>
        <td class="right" style="white-space:nowrap">
          <button class="btn-link crawl-btn" data-domain="${AR.escapeHtml(domain)}" data-url="${AR.escapeHtml(v.url)}" style="margin-right:.4rem">
            Crawl
          </button>
          <button class="btn-link mail-btn" data-domain="${AR.escapeHtml(domain)}" data-url="${AR.escapeHtml(v.url)}" style="margin-right:.4rem">
            Mail
          </button>
          <button class="btn-link site-del-btn" data-domain="${AR.escapeHtml(domain)}" style="color:var(--red)">
            Delete
          </button>
        </td>
      </tr>
    `;
  }).join("");

  host.innerHTML = `
    <table class="tbl">
      <thead><tr><th>Domain</th><th>Type</th><th>Anchor</th><th class="right">DR</th><th class="right">Traffic</th><th class="right">Spam</th><th>State</th><th>Last seen</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="padding:.7rem 1.1rem;border-top:1px solid var(--border);font-size:.78rem;color:var(--text-3)">Showing ${items.length} rows</div>
  `;

  // Mail butonlarını bağla
  document.querySelectorAll(".mail-btn").forEach(btn => {
    btn.addEventListener("click", () => openMailModal(btn.dataset.domain));
  });

  // Site delete butonları
  document.querySelectorAll(".site-del-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const d = btn.dataset.domain;
      if (!confirm(`Delete site ${d}?\n\nThis removes:\n- Site row\n- All detected hacklinks\n- All saved contacts\n- All notification records\n\nBacklink CSV intake rows are KEPT (source of truth). Evidence files are KEPT (use Evidence → Delete to remove those separately).\n\nCannot be undone.`)) return;
      btn.disabled = true; btn.textContent = "Deleting…";
      try {
        await AR.del(`/sites/${encodeURIComponent(d)}`);
        AR.toast(`${d} removed`, "success");
        loadVictims();
      } catch (e) {
        AR.toast(e.message, "error");
        btn.disabled = false; btn.textContent = "Delete";
      }
    });
  });

  // Crawl butonlarını bağla
  document.querySelectorAll(".crawl-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const domain = btn.dataset.domain;
      if (!confirm(`${domain}\n\nCrawl kuyruğuna eklensin mi?\nVPN-TR (Istanbul) üzerinden site açılır, screenshot+DOM+hacklink JSON evidence vault'a kaydedilir. 3-5 dk sürer.`)) return;
      btn.textContent = "Queuing…";
      btn.disabled = true;
      try {
        await AR.post(`/crawl/${encodeURIComponent(domain)}`);
        AR.toast(`${domain} → kuyruğa eklendi`, "success");
        btn.textContent = "Queued ✓";
        pollCrawlStatus(domain, btn);
      } catch (e) {
        AR.toast(e.message, "error");
        btn.textContent = "Crawl →";
        btn.disabled = false;
      }
    });
  });
}

// ─── Mail modal ─────────────────────────────────────────────
function ensureMailModal() {
  if (document.getElementById("mail-modal")) return;
  const m = document.createElement("div");
  m.id = "mail-modal";
  m.style.cssText = "position:fixed;inset:0;background:rgba(0,16,22,0.75);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem";
  m.innerHTML = `
    <div style="background:var(--bg-card);border:1px solid var(--border-hi);border-radius:10px;width:100%;max-width:580px;max-height:80vh;display:flex;flex-direction:column">
      <div style="padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <h3 style="margin:0;font-size:1rem" id="mm-title">Send breach notification</h3>
        <button class="icon-btn" id="mm-close" aria-label="Close"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div id="mm-body" style="padding:1rem 1.2rem;overflow-y:auto;flex:1">Loading…</div>
      <div style="padding:.85rem 1.2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:.6rem">
        <span id="mm-counter" style="font-size:.78rem;color:var(--text-3)">0 / 10 selected</span>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-ghost" id="mm-find">Find contacts</button>
          <button class="btn btn-primary" id="mm-send" disabled>Send selected</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(m);
  m.addEventListener("click", (e) => { if (e.target === m) closeMailModal(); });
  document.getElementById("mm-close").addEventListener("click", closeMailModal);
}

function closeMailModal() {
  const m = document.getElementById("mail-modal");
  if (m) m.style.display = "none";
}

let MAIL_DOMAIN = null;
let MAIL_CONTACTS = [];

async function openMailModal(domain) {
  ensureMailModal();
  MAIL_DOMAIN = domain;
  document.getElementById("mm-title").textContent = `Notify: ${domain}`;
  document.getElementById("mail-modal").style.display = "flex";
  document.getElementById("mm-body").innerHTML = '<div class="loading-spinner">Loading saved contacts…</div>';
  document.getElementById("mm-find").onclick = () => findContacts(domain);
  document.getElementById("mm-send").onclick = sendSelected;

  try {
    const r = await AR.get(`/contacts/${encodeURIComponent(domain)}/saved`);
    MAIL_CONTACTS = r.contacts || [];
    renderMailContacts();
  } catch (e) {
    document.getElementById("mm-body").innerHTML = `<div class="error-banner">${AR.escapeHtml(e.message)}</div>`;
  }
}

function renderMailContacts() {
  const body = document.getElementById("mm-body");
  if (!MAIL_CONTACTS.length) {
    body.innerHTML = '<div class="empty-state">No saved contacts yet. Click "Find contacts" to scan WHOIS, security.txt and the site itself for emails.</div>';
    updateCounter();
    return;
  }
  body.innerHTML = `
    <div style="font-size:.78rem;color:var(--text-3);margin-bottom:.7rem">Pick up to 10 recipients. Mail goes from <span class="mono">research@abuseradar.org</span>, Reply-To <span class="mono">team@abuseradar.org</span>.</div>
    <div style="display:flex;flex-direction:column;gap:.4rem">
      ${MAIL_CONTACTS.map(c => `
        <label style="display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;border:1px solid var(--border);border-radius:6px;cursor:pointer">
          <input type="checkbox" class="mm-cb" data-id="${c.id}" style="accent-color:var(--teal);flex:0 0 auto">
          <div style="flex:1;min-width:0">
            <div class="mono" style="font-size:.82rem;color:var(--text)">${AR.escapeHtml(c.email)}</div>
            <div style="font-size:.7rem;color:var(--text-4);margin-top:.15rem">type: ${AR.escapeHtml(c.contact_type || "—")} · source: ${AR.escapeHtml(c.source || "—")}</div>
          </div>
        </label>
      `).join("")}
    </div>
  `;
  body.querySelectorAll(".mm-cb").forEach(cb => cb.addEventListener("change", updateCounter));
  updateCounter();
}

function updateCounter() {
  const checked = document.querySelectorAll(".mm-cb:checked");
  const n = checked.length;
  document.getElementById("mm-counter").textContent = `${n} / 10 selected`;
  document.getElementById("mm-counter").style.color = n > 10 ? "var(--red)" : "var(--text-3)";
  // 10'u aşmayı engelle
  if (n >= 10) {
    document.querySelectorAll(".mm-cb:not(:checked)").forEach(cb => cb.disabled = true);
  } else {
    document.querySelectorAll(".mm-cb").forEach(cb => cb.disabled = false);
  }
  document.getElementById("mm-send").disabled = n === 0 || n > 10;
}

async function findContacts(domain) {
  const findBtn = document.getElementById("mm-find");
  findBtn.disabled = true;
  findBtn.textContent = "Searching…";
  document.getElementById("mm-body").innerHTML = '<div class="loading-spinner">Scanning WHOIS, security.txt, site pages…</div>';
  try {
    const r = await AR.post(`/contacts/${encodeURIComponent(domain)}`);
    MAIL_CONTACTS = r.contacts || [];
    AR.toast(`${r.count} contact found`, "success");
    renderMailContacts();
  } catch (e) {
    document.getElementById("mm-body").innerHTML = `<div class="error-banner">${AR.escapeHtml(e.message)}</div>`;
    AR.toast(e.message, "error");
  } finally {
    findBtn.disabled = false;
    findBtn.textContent = "Find contacts";
  }
}

async function sendSelected() {
  const ids = Array.from(document.querySelectorAll(".mm-cb:checked")).map(cb => parseInt(cb.dataset.id, 10));
  if (!ids.length) return;
  if (!confirm(`${ids.length} adrese mail gönderilsin mi?\n\nFrom: research@abuseradar.org\nReply-To: team@abuseradar.org\n\nThis is real outbound email — make sure the site is verified.`)) return;

  const sendBtn = document.getElementById("mm-send");
  sendBtn.disabled = true;
  sendBtn.textContent = "Sending…";
  try {
    const r = await AR.post("/notifications/send-batch", { contact_ids: ids });
    AR.toast(`Sent: ${r.sent}, skipped: ${r.skipped}, errors: ${r.errors}`, r.errors ? "error" : "success");
    sendBtn.textContent = `Sent ${r.sent}`;
    setTimeout(closeMailModal, 1500);
  } catch (e) {
    AR.toast(e.message, "error");
    sendBtn.textContent = "Send selected";
    sendBtn.disabled = false;
  }
}

async function pollCrawlStatus(domain, btn) {
  const start = Date.now();
  while (Date.now() - start < 600000) {  // 10 dk timeout
    await new Promise(r => setTimeout(r, 5000));
    try {
      const s = await AR.get(`/crawl/${encodeURIComponent(domain)}/status`);
      if (s.status === "running") {
        btn.textContent = "Running…";
      } else if (s.status === "completed") {
        btn.textContent = `✓ ${s.total_hacklinks || 0} hacklink`;
        btn.style.color = "var(--green)";
        AR.toast(`${domain}: ${s.total_hacklinks || 0} hacklink tespit edildi`, "success");
        setTimeout(loadVictims, 1500);
        return;
      } else if (s.status === "error") {
        btn.textContent = "Error";
        btn.style.color = "var(--red)";
        btn.title = s.error || "";
        AR.toast(`${domain} crawl hatası: ${s.error || "?"}`, "error");
        return;
      }
    } catch (e) { /* retry */ }
  }
  btn.textContent = "Timeout";
}

document.querySelectorAll(".vic-tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".vic-tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    state.verified = t.dataset.verified;
    loadVictims();
  });
});

document.getElementById("f-type").addEventListener("change", e => {
  state.type = e.target.value;
  loadVictims();
});

document.getElementById("text-filter").addEventListener("input", renderTable);

document.getElementById("btn-find-contacts").addEventListener("click", async () => {
  const domain = document.getElementById("contact-domain").value.trim();
  if (!domain) { AR.toast("Domain required", "error"); return; }
  const result = document.getElementById("contacts-result");
  result.innerHTML = '<div class="loading-spinner">Searching…</div>';
  try {
    const r = await AR.post(`/contacts/${domain}`);
    if (!r.contacts || !r.contacts.length) {
      result.innerHTML = '<div class="empty-state">No contacts found.</div>';
      return;
    }
    result.innerHTML = `
      <div style="margin-top:.7rem">
        <strong>${r.count} contacts found:</strong>
        <ul style="margin-top:.5rem;padding-left:1.2rem;font-size:.85rem">
          ${r.contacts.map(c => `<li><span class="mono">${AR.escapeHtml(c.email)}</span> <span style="color:var(--text-4)">· ${AR.escapeHtml(c.contact_type)} · source: ${AR.escapeHtml(c.source)}</span></li>`).join("")}
        </ul>
      </div>
    `;
  } catch (e) {
    result.innerHTML = `<div class="error-banner">${AR.escapeHtml(e.message)}</div>`;
  }
});

document.getElementById("btn-export").addEventListener("click", () => {
  if (!lastVictims.length) { AR.toast("Nothing to export", "error"); return; }
  const headers = ["domain","title","type","anchor","dr","traffic","spam_score","verified","last_seen"];
  const csv = [headers.join(",")].concat(
    lastVictims.map(v => [
      AR.fmt.domain(v.url),
      JSON.stringify(v.title || ""),
      v.type || "",
      JSON.stringify(v.anchor || ""),
      v.dr ?? "",
      v.traffic ?? "",
      v.spam_score ?? "",
      v.verified === true ? "yes" : v.verified === false ? "no" : "pending",
      v.last_seen || "",
    ].join(","))
  ).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `abuseradar-victims-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

// Active tab styling helper
const tabStyle = document.createElement("style");
tabStyle.textContent = `.vic-tab.active{background:var(--teal-soft);color:var(--teal);border-color:var(--border-hi)}`;
document.head.appendChild(tabStyle);

loadVictims();
</script>
</body>
</html>
